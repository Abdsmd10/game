<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Plinko: Elite 2.5D Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #111827; --accent: #fbbf24;
            --red: #ef4444; --blue: #3b82f6; --green: #22c55e; --white: #ffffff;
        }
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }
        #stream-wrapper {
            width: calc(100vh * 9 / 16); height: 100vh;
            background: url('1.jpg');
            background-size: cover; 
            background-position: center;
            display: flex; flex-direction: column; position: relative; 
            border: 2px solid #334155; box-sizing: border-box; 
            opacity: 0.75;
        }
        
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 50; 
            pointer-events: none;
            /* Added 'both' to maintain state and ensured animation name matches */
            animation: flashOverlay 6s linear infinite both;
            display: block;
        }

        @keyframes flashOverlay {
            0% { opacity: 1; }
            33% { opacity: 1; }
            34% { opacity: 0; }
            100% { opacity: 0; }
        }

        #header-board { 
            padding: 12px; 
            background: transparent; 
            border-bottom: 2px solid var(--accent); 
            z-index: 10; 
            backdrop-filter: none; 
        }
        
        .bg-control { display: flex; gap: 4px; margin-bottom: 8px; }
        .bg-control input { flex-grow: 1; background: rgba(0,0,0,0.7); border: 1px solid #334155; color: white; font-size: 10px; padding: 4px; border-radius: 4px; }
        .bg-control button { background: var(--accent); border: none; color: black; font-weight: bold; font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        .timer-display { text-align: center; font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 1); }
        .team-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .score-card { background: rgba(0,0,0,0.7); border-bottom: 4px solid var(--c); text-align: center; padding: 6px; border-radius: 4px; }
        .score-card .val { font-family: monospace; font-size: 1.2rem; display: block; font-weight: bold; }
        .score-card .label { font-size: 0.65rem; color: #cbd5e1; font-weight: bold; }
        .win-count { color: var(--accent); font-size: 0.75rem; margin-left: 2px; }

        #game-container { 
            flex-grow: 1; width: 100%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; 
            perspective: 1000px;
            background: transparent !important;
        }
        #game-container canvas { 
            width: 100% !important; height: auto !important; 
            transform: rotateX(5deg); 
            background: transparent !important;
        }

        #finish-line-ui {
            position: absolute; bottom: 80px; width: 100%; height: 40px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border-top: 4px solid var(--accent);
            display: flex; pointer-events: none; z-index: 5;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }
        
        .celebration-box { position: absolute; left: 50%; transform: translateX(-50%) scale(0); background: rgba(17, 24, 39, 0.98); border: 3px solid var(--accent); border-radius: 15px; text-align: center; z-index: 100; transition: 0.5s; }
        .celebration-box.show { transform: translateX(-50%) scale(1); }
        
        #audio-unlock {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="audio-unlock">
    <h2 style="color: var(--accent)">CLICK TO START</h2>
</div>

<div id="stream-wrapper">
    <img src="overlay.png" id="game-overlay" alt="Overlay">

    <div id="header-board">
        <div class="bg-control">
            <input type="text" id="bg-url-input" placeholder="Enter background image URL...">
            <button onclick="updateBackground()">SET BG</button>
        </div>

        <div class="timer-display" id="timer">02:00</div>
        <div class="team-container">
            <div class="score-card" style="--c: var(--red)"><span class="label">RED <span class="win-count" id="wins-red">[0]</span></span><span class="val" id="score-red">0</span></div>
            <div class="score-card" style="--c: var(--blue)"><span class="label">BLUE <span class="win-count" id="wins-blue">[0]</span></span><span class="val" id="score-blue">0</span></div>
            <div class="score-card" style="--c: var(--green)"><span class="label">GREEN <span class="win-count" id="wins-green">[0]</span></span><span class="val" id="score-green">0</span></div>
            <div class="score-card" style="--c: var(--white)"><span class="label">WHITE <span class="win-count" id="wins-white">[0]</span></span><span class="val" id="score-white">0</span></div>
        </div>
    </div>

    <div id="game-container"></div>
    <div id="finish-line-ui"></div>

    <div id="team-celebration" class="celebration-box" style="top: 30%; width: 220px; padding: 20px;">
        <div style="font-size: 0.8rem; color: var(--accent);">WINNING TEAM</div>
        <div id="win-team-name" style="font-size: 2rem; font-weight: 900;">---</div>
    </div>
</div>

<script>
// FORCE RELOAD OVERLAY TO PREVENT RENDER CACHING ISSUES
window.addEventListener('DOMContentLoaded', () => {
    const overlay = document.getElementById('game-overlay');
    const currentSrc = overlay.src;
    overlay.src = currentSrc + "?t=" + new Date().getTime();
});

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isPaused = true; 

function updateBackground() {
    const url = document.getElementById('bg-url-input').value;
    if (url) {
        document.getElementById('stream-wrapper').style.backgroundImage = `url('${url}')`;
    }
}

const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
const engine = Engine.create();
const runner = Runner.create();
const container = document.getElementById('game-container');
const gameWidth = 400; const gameHeight = 400;
const colors = { red: '#ef4444', blue: '#3b82f6', green: '#22c55e', white: '#ffffff' };

const testPFPs = {
    red: "https://i.pravatar.cc/100?u=red",
    blue: "https://i.pravatar.cc/100?u=blue",
    green: "https://i.pravatar.cc/100?u=green",
    white: "https://i.pravatar.cc/100?u=white"
};

let scores = { red: 0, blue: 0, green: 0, white: 0 };
let roundWins = { red: 0, blue: 0, green: 0, white: 0 }; 
let timeLeft = 120; 

let trails = [];
const TRAIL_LENGTH = 12; 
const pfpCache = {};

document.getElementById('audio-unlock').addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPaused = false;
    Runner.run(runner, engine); 
    document.getElementById('audio-unlock').style.display = 'none';
});

function playSound(type) {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'peg') {
        osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'score') {
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
}

const render = Render.create({
    element: container, engine: engine,
    options: { 
        width: gameWidth, 
        height: gameHeight, 
        wireframes: false, 
        background: 'transparent'
    }
});

function spawnBall(team, user, pfpUrl, overridePause = false) {
    if (isPaused && !overridePause) return;
    const tLabel = team.toLowerCase();
    const tColor = colors[tLabel];
    if(!tColor) return;

    const ballRadius = 12; 
    const ball = Bodies.circle(gameWidth/2 + (Math.random()*40-20), 0, ballRadius, { 
        restitution: 0.8, friction: 0.005, frictionAir: 0.001, label: tLabel,
        render: { fillStyle: 'transparent' }
    });

    if (pfpUrl && !pfpCache[pfpUrl]) {
        const img = new Image();
        img.src = pfpUrl;
        pfpCache[pfpUrl] = img;
    }

    ball.pfpUrl = pfpUrl;
    Composite.add(engine.world, ball);
    trails.push({ id: ball.id, color: tColor, points: [] });
}

window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const map = { 'x': 'red', 'c': 'blue', 'v': 'green', 'b': 'white' };
    if (map[key]) spawnBall(map[key], "Tester", testPFPs[map[key]]);
});

const rows = 7;
const stickLen = 60;
const stickThick = 10;
for (let i = 0; i < rows; i++) {
    const yPos = 40 + (i * 40); 
    if (i % 2 === 0) {
        Composite.add(engine.world, Bodies.rectangle(gameWidth / 2, yPos, stickLen, stickThick, {
            isStatic: true, restitution: 1.1, angle: (Math.random() > 0.5 ? 0.15 : -0.15), label: 'peg',
            render: { fillStyle: '#fff' }
        }));
        Composite.add(engine.world, [
            Bodies.rectangle(60, yPos, stickLen, stickThick, { isStatic: true, restitution: 1.1, angle: 0.4, label: 'peg', render: { fillStyle: '#fff' } }),
            Bodies.rectangle(gameWidth - 60, yPos, stickLen, stickThick, { isStatic: true, restitution: 1.1, angle: -0.4, label: 'peg', render: { fillStyle: '#fff' } })
        ]);
    } else {
        Composite.add(engine.world, [
            Bodies.rectangle(gameWidth / 2 - 80, yPos, stickLen, stickThick, { isStatic: true, restitution: 1.1, angle: -0.3, label: 'peg', render: { fillStyle: '#fff' } }),
            Bodies.rectangle(gameWidth / 2 + 80, yPos, stickLen, stickThick, { isStatic: true, restitution: 1.1, angle: 0.3, label: 'peg', render: { fillStyle: '#fff' } })
        ]);
    }
}

function createZones() {
    const zw = gameWidth / 4;
    for (let i = 0; i < 4; i++) {
        Composite.add(engine.world, Bodies.rectangle((i * zw) + (zw / 2), gameHeight - 10, zw, 20, { 
            isStatic: true, isSensor: true, label: 'goal', render: { fillStyle: 'transparent' }
        }));
    }
}
createZones();
Render.run(render);

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    const allBodies = Composite.allBodies(engine.world);
    const pegs = allBodies.filter(b => b.label === 'peg');
    const allBalls = allBodies.filter(b => colors[b.label]);

    pegs.forEach(peg => {
        const { x, y } = peg.position;
        const angle = peg.angle;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(-stickLen/2 + 4, -stickThick/2 + 4, stickLen, stickThick);
        ctx.fillStyle = '#94a3b8';
        ctx.fillRect(-stickLen/2, -stickThick/2, stickLen, stickThick + 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-stickLen/2, -stickThick/2 - 2, stickLen, stickThick);
        ctx.restore();
    });

    trails.forEach(trail => {
        if (trail.points.length < 2) return;
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        ctx.lineWidth = 26;
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#000';
        ctx.moveTo(trail.points[0].x + 5, trail.points[0].y + 5);
        for(let i = 1; i < trail.points.length; i++) ctx.lineTo(trail.points[i].x + 5, trail.points[i].y + 5);
        ctx.stroke();

        for (let i = 0; i < trail.points.length - 1; i++) {
            const p1 = trail.points[i];
            const p2 = trail.points[i + 1];
            const opacity = 0.95 * Math.pow(1 - (i / trail.points.length), 0.4);
            ctx.globalAlpha = opacity;
            ctx.lineWidth = 24 * (1 - (i / (trail.points.length * 2.5))); 
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = trail.color;
            ctx.stroke();
        }
        ctx.restore();
    });

    allBalls.forEach(ball => {
        const { x, y } = ball.position;
        const radius = ball.circleRadius;
        const img = pfpCache[ball.pfpUrl];

        ctx.save();
        ctx.beginPath();
        ctx.ellipse(x + 4, y + 4, radius, radius*0.8, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();

        const grad = ctx.createRadialGradient(x - radius/3, y - radius/3, radius/4, x, y, radius);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.2, colors[ball.label]);
        grad.addColorStop(1, '#000');

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.85, 0, Math.PI * 2);
        ctx.clip();
        if (img && img.complete) {
            ctx.globalAlpha = 0.85;
            ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2);
        }
        ctx.restore();
    });
});

const socket = typeof io !== 'undefined' ? io() : { on: () => {} }; 

socket.on('dropBall', data => {
    const amount = data.count || 1; 
    for (let i = 0; i < amount; i++) {
        setTimeout(() => {
            spawnBall(data.team, data.user, data.pfp || testPFPs[data.team.toLowerCase()], true); 
        }, i * 150); 
    }
});

Events.on(engine, 'beforeUpdate', () => {
    const allBodies = Composite.allBodies(engine.world);
    const activeBalls = allBodies.filter(b => colors[b.label]);
    trails.forEach(trail => {
        const ball = activeBalls.find(b => b.id === trail.id);
        if (ball) {
            trail.points.unshift({ x: ball.position.x, y: ball.position.y });
            if (trail.points.length > TRAIL_LENGTH) trail.points.pop();
        }
    });
});

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === 'peg' || bodyB.label === 'peg') playSound('peg');
        const isGoalA = bodyA.label === 'goal';
        const isGoalB = bodyB.label === 'goal';
        if (isGoalA || isGoalB) {
            const ball = isGoalA ? bodyB : bodyA;
            if (colors[ball.label]) {
                playSound('score');
                scores[ball.label] += 10;
                const scoreEl = document.getElementById(`score-${ball.label}`);
                if (scoreEl) scoreEl.innerText = scores[ball.label];
                trails = trails.filter(t => t.id !== ball.id);
                Composite.remove(engine.world, ball);
            }
        }
    });
});

setInterval(() => {
    if (isPaused) return;
    timeLeft--;
    let minutes = Math.floor(timeLeft / 60);
    let seconds = (timeLeft % 60).toString().padStart(2, '0');
    document.getElementById('timer').innerText = `0${minutes}:${seconds}`;
    if (timeLeft <= 0) {
        isPaused = true;
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        roundWins[winner]++;
        document.getElementById(`wins-${winner}`).innerText = `[${roundWins[winner]}]`;
        document.getElementById('win-team-name').innerText = winner.toUpperCase();
        document.getElementById('win-team-name').style.color = colors[winner];
        document.getElementById('team-celebration').classList.add('show');
        setTimeout(() => {
            document.getElementById('team-celebration').classList.remove('show');
            timeLeft = 120; 
            scores = {red:0, blue:0, green:0, white:0};
            Object.keys(colors).forEach(t => {
                const el = document.getElementById(`score-${t}`);
                if (el) el.innerText = '0';
            });
            isPaused = false;
        }, 6000);
    }
}, 1000);
</script>
</body>
</html>
