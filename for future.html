<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Plinko: Elite Streamer Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #111827; --accent: #fbbf24;
            --red: #ef4444; --blue: #3b82f6; --green: #22c55e; --white: #ffffff;
        }
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }
        #stream-wrapper {
            width: calc(100vh * 9 / 16); height: 100vh;
            background: linear-gradient(rgba(5, 7, 10, 0.8), rgba(5, 7, 10, 0.8)), url('1.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; position: relative; 
            border: 2px solid #334155; box-sizing: border-box; 
        }
        #header-board { padding: 12px; background: rgba(22, 30, 45, 0.6); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; backdrop-filter: blur(8px); }
        .timer-display { text-align: center; font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 8px; }
        .team-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .score-card { background: rgba(0,0,0,0.4); border-bottom: 4px solid var(--c); text-align: center; padding: 6px; border-radius: 4px; }
        .score-card .val { font-family: monospace; font-size: 1.2rem; display: block; font-weight: bold; }
        .score-card .label { font-size: 0.65rem; color: #94a3b8; font-weight: bold; }
        .win-count { color: var(--accent); font-size: 0.75rem; margin-left: 2px; }

        #game-container { flex-grow: 1; width: 100%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #game-container canvas { width: 100% !important; height: auto !important; }
        
        .celebration-box { position: absolute; left: 50%; transform: translateX(-50%) scale(0); background: rgba(17, 24, 39, 0.98); border: 3px solid var(--accent); border-radius: 15px; text-align: center; z-index: 100; transition: 0.5s; }
        .celebration-box.show { transform: translateX(-50%) scale(1); }
        
        #audio-unlock {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="audio-unlock">
    <h2 style="color: var(--accent)">CLICK TO START GAME</h2>
    <p>Required to enable Sound & Global Controls</p>
</div>

<div id="stream-wrapper">
    <div id="header-board">
        <div class="timer-display" id="timer">02:00</div>
        <div class="team-container">
            <div class="score-card" style="--c: var(--red)"><span class="label">RED <span class="win-count" id="wins-red">[0]</span></span><span class="val" id="score-red">0</span></div>
            <div class="score-card" style="--c: var(--blue)"><span class="label">BLUE <span class="win-count" id="wins-blue">[0]</span></span><span class="val" id="score-blue">0</span></div>
            <div class="score-card" style="--c: var(--green)"><span class="label">GREEN <span class="win-count" id="wins-green">[0]</span></span><span class="val" id="score-green">0</span></div>
            <div class="score-card" style="--c: var(--white)"><span class="label">WHITE <span class="win-count" id="wins-white">[0]</span></span><span class="val" id="score-white">0</span></div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="team-celebration" class="celebration-box" style="top: 30%; width: 220px; padding: 20px;">
        <div style="font-size: 0.8rem; color: var(--accent);">WINNING TEAM</div>
        <div id="win-team-name" style="font-size: 2rem; font-weight: 900;">---</div>
    </div>

    <div id="mvp-celebration" class="celebration-box" style="top: 55%; width: 180px; padding: 15px;">
        <div style="font-size: 0.7rem;">TOP SCORER</div>
        <img id="mvp-pfp" style="width: 60px; height: 60px; border-radius: 50%; margin: 10px 0; border: 3px solid var(--accent);" src="">
        <div id="mvp-name" style="font-size: 1rem; font-weight: bold;">---</div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.getElementById('audio-unlock').addEventListener('click', () => {
    audioCtx.resume();
    document.getElementById('audio-unlock').style.display = 'none';
});

function playSound(type) {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'peg') {
        osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'score') {
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
}

const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
const engine = Engine.create();
const container = document.getElementById('game-container');
const gameWidth = 400; const gameHeight = 400;
const colors = { red: '#ef4444', blue: '#3b82f6', green: '#22c55e', white: '#ffffff' };

let scores = { red: 0, blue: 0, green: 0, white: 0 };
let roundWins = { red: 0, blue: 0, green: 0, white: 0 }; 
let playerScores = {}; 
let timeLeft = 120; 
let isPaused = false;

const render = Render.create({
    element: container, engine: engine,
    options: { width: gameWidth, height: gameHeight, wireframes: false, background: 'transparent' }
});

function spawnBall(team, user, pfp, overridePause = false) {
    if (isPaused && !overridePause) return;
    const tColor = colors[team.toLowerCase()];
    if(!tColor) return;
    const ball = Bodies.circle(gameWidth/2 + (Math.random()*20-10), 0, 7, { 
        restitution: 0.5, label: team.toLowerCase(), 
        render: { fillStyle: tColor, strokeStyle: '#fff', lineWidth: 1 } 
    });
    ball.owner = user; ball.pfp = pfp;
    Composite.add(engine.world, ball);
}

window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const map = { 'x': 'red', 'c': 'blue', 'v': 'green', 'b': 'white' };
    if (map[key]) spawnBall(map[key], "Host", "");
});

// Grid & Zones
for (let i = 0; i < 12; i++) {
    for (let j = 0; j < 10; j++) {
        const xOffset = (i % 2 === 0) ? 0 : 17.5;
        const x = 40 + (j * 35) + xOffset;
        if (x < 390 && x > 10) Composite.add(engine.world, Bodies.circle(x, 50 + (i * 26), 3.5, { isStatic: true, label: 'peg', render: { fillStyle: '#fff' } }));
    }
}

function createZones() {
    const zw = gameWidth / 7;
    for (let i = 0; i < 7; i++) {
        Composite.add(engine.world, Bodies.rectangle((i * zw) + (zw / 2), gameHeight - 20, zw, 40, { isStatic: true, isSensor: true, label: 'goal' }));
        if(i > 0) Composite.add(engine.world, Bodies.rectangle(i * zw, gameHeight - 30, 6, 60, { isStatic: true, render: { fillStyle: 'rgba(255,255,255,0.4)' } }));
    }
}
createZones();
Render.run(render);
Runner.run(Runner.create(), engine);

// Fixed Socket Listener
const socket = io(); 
socket.on('dropBall', data => {
    for(let i=0; i<(data.count || 1); i++) {
        setTimeout(() => spawnBall(data.team, data.user, data.profilePic, true), i * 150);
    }
});

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        if (pair.bodyA.label === 'peg' || pair.bodyB.label === 'peg') playSound('peg');
        const goal = pair.bodyA.label === 'goal' ? pair.bodyA : (pair.bodyB.label === 'goal' ? pair.bodyB : null);
        const ball = goal === pair.bodyA ? pair.bodyB : (goal === pair.bodyB ? pair.bodyA : null);
        if (goal && ball && colors[ball.label]) {
            playSound('score');
            scores[ball.label] += 10;
            document.getElementById(`score-${ball.label}`).innerText = scores[ball.label];
            if (ball.owner) {
                if (!playerScores[ball.owner]) playerScores[ball.owner] = { score: 0, pfp: ball.pfp };
                playerScores[ball.owner].score += 10;
            }
            Composite.remove(engine.world, ball);
        }
    });
});

setInterval(() => {
    if (isPaused) return;
    timeLeft--;
    document.getElementById('timer').innerText = `0${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2, '0')}`;
    if (timeLeft <= 0) {
        isPaused = true;
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        roundWins[winner]++;
        document.getElementById(`wins-${winner}`).innerText = `[${roundWins[winner]}]`;
        document.getElementById('win-team-name').innerText = winner.toUpperCase();
        document.getElementById('win-team-name').style.color = colors[winner];
        document.getElementById('team-celebration').classList.add('show');
        setTimeout(() => {
            document.getElementById('team-celebration').classList.remove('show');
            timeLeft = 120; scores = {red:0,blue:0,green:0,white:0}; playerScores = {};
            Object.keys(scores).forEach(t => document.getElementById(`score-${t}`).innerText = '0');
            isPaused = false;
        }, 6000);
    }
}, 1000);
</script>
</body>
</html>
